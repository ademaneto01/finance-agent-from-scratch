version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance}
      POSTGRES_DB: ${POSTGRES_DB:-finance}
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - finance-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: finance-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-api-key}
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3"
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - finance-network

  # Create Qdrant Collection (runs once at startup)
  create-collection:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-create-collection
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-api-key}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
    command: uv run python -m api.ingestion.create_collection
    networks:
      - finance-network
    profiles:
      - init

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GUARDRAILS_TOKEN: ${GUARDRAILS_TOKEN}
    container_name: finance-api
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-api-key}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GUARDRAILS_TOKEN: ${GUARDRAILS_TOKEN}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://finance:finance@postgres:5432/finance}
      RUNNER_TIMEZONE: ${RUNNER_TIMEZONE:-UTC}
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
    networks:
      - finance-network

  # Daily ticker ingestion runner
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-runner
    working_dir: /app/api
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-api-key}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://finance:finance@postgres:5432/finance}
      RUNNER_TIMEZONE: ${RUNNER_TIMEZONE:-UTC}
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
    command: uv run python runner.py
    restart: unless-stopped
    networks:
      - finance-network

volumes:
  qdrant_storage:
    driver: local
  postgres_storage:
    driver: local

networks:
  finance-network:
    driver: bridge
