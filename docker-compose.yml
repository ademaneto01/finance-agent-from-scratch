version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: finance-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-api-key}
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  # Create Qdrant Collection (runs once at startup)
  # create-collection:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: finance-create-collection
  #   environment:
  #     QDRANT_URL: http://qdrant:6333
  #     QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-api-key}
  #     GROQ_API_KEY: ${GROQ_API_KEY:-}
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #   depends_on:
  #     qdrant:
  #       condition: service_healthy
  #   command: python -m api.ingestion.create_collection
  #   networks:
  #     - finance-network
  #   profiles:
  #     - init

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-api
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-api-key}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
    networks:
      - finance-network

volumes:
  qdrant_storage:
    driver: local

networks:
  finance-network:
    driver: bridge
